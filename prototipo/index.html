<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIGMA · Prototipo funcional</title>
<link rel="stylesheet" href="styles.css?v=4">
</head>
<body>

<!-- LOGIN -->
<div id="login" class="login-wrap">
  <div class="login-card">
    <div class="logo"><b>SIGMA</b></div>
    <p style="color:var(--muted);margin:0 0 16px;font-size:.85rem">Gestión de mantenimiento de activos · UTN-FRRe</p>
    <div class="hu-row" id="login-hu"></div>
    <div class="field"><label>Usuario / Legajo</label><input value="admin"></div>
    <div class="field"><label>Contraseña</label><input type="password" value="••••••"></div>
    <button class="btn pri" style="width:100%;justify-content:center" onclick="enter()">Ingresar</button>
    <p style="text-align:center;margin:14px 0 0"><a href="#" style="color:var(--accent);font-size:.8rem;text-decoration:none" onclick="recuperar();return false">¿Olvidaste tu contraseña?</a></p>
  </div>
</div>

<!-- APP -->
<div id="app" class="app hidden">
  <aside class="side">
    <div class="logo"><b>SIGMA</b><span>Prototipo</span><button class="hu-list-btn" onclick="openHUList()" title="Ver todas las HU">❯ HU</button></div>
    <div class="role-switch">
      <label>Rol (demo)</label>
      <select id="role" onchange="setRole(this.value)">
        <option value="admin">Administrador</option>
        <option value="tec">Técnico</option>
        <option value="auto">Usuario autorizado</option>
      </select>
    </div>
    <nav id="nav"></nav>
  </aside>
  <div class="main">
    <div class="topbar">
      <h1 id="view-title">Dashboard</h1>
      <div class="who"><span id="who-name">Admin Demo</span><div class="avatar" id="who-av">A</div></div>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>

<div id="toast"></div>
<script src="app.js?v=4"></script>
</body>
</html>
